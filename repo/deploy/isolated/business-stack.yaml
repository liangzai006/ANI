apiVersion: v1
kind: ServiceAccount
metadata:
  name: ani-gateway
  namespace: ani-system
  labels:
    app.kubernetes.io/name: ani-gateway
    ani.deploy/profile: isolated
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ani-auth-service
  namespace: ani-system
  labels:
    app.kubernetes.io/name: ani-auth-service
    ani.deploy/profile: isolated
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ani-auth-service
  namespace: ani-system
  labels:
    app.kubernetes.io/name: ani-auth-service
    ani.deploy/profile: isolated
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ani-auth-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ani-auth-service
        ani.deploy/profile: isolated
    spec:
      serviceAccountName: ani-auth-service
      containers:
        - name: ani-auth-service
          image: docker.changqingyun.cn/ani/ani-auth-service:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 9101
            - name: health
              containerPort: 9201
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ani-services-runtime
                  key: database_url
            - name: NATS_URL
              valueFrom:
                secretKeyRef:
                  name: ani-services-runtime
                  key: nats_url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: ani-services-runtime
                  key: redis_url
            - name: GRPC_PORT
              value: "9101"
            - name: HEALTH_PORT
              value: "9201"
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ani-auth-service
  namespace: ani-system
  labels:
    app.kubernetes.io/name: ani-auth-service
    ani.deploy/profile: isolated
spec:
  selector:
    app.kubernetes.io/name: ani-auth-service
  ports:
    - name: grpc
      port: 9101
      targetPort: grpc
    - name: health
      port: 9201
      targetPort: health
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ani-gateway
  namespace: ani-system
  labels:
    app.kubernetes.io/name: ani-gateway
    ani.deploy/profile: isolated
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ani-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ani-gateway
        ani.deploy/profile: isolated
    spec:
      serviceAccountName: ani-gateway
      containers:
        - name: ani-gateway
          image: docker.changqingyun.cn/ani/ani-gateway:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ani-services-runtime
                  key: database_url
            - name: NATS_URL
              valueFrom:
                secretKeyRef:
                  name: ani-services-runtime
                  key: nats_url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: ani-services-runtime
                  key: redis_url
            - name: ANI_AUTH_MODE
              value: "auth_service"
            - name: AUTH_SERVICE_ADDR
              value: "ani-auth-service.ani-system.svc.cluster.local:9101"
            - name: GATEWAY_HTTP_ADDR
              value: ":8080"
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ani-gateway
  namespace: ani-system
  labels:
    app.kubernetes.io/name: ani-gateway
    ani.deploy/profile: isolated
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: ani-gateway
  ports:
    - name: http
      port: 8080
      targetPort: http
      nodePort: 30080
---
