apiVersion: v1
kind: Namespace
metadata:
  name: ani-data
  labels:
    app.kubernetes.io/part-of: ani-core
    ani.deploy/profile: isolated
---
apiVersion: v1
kind: Service
metadata:
  name: ani-postgres
  namespace: ani-data
  labels:
    app.kubernetes.io/name: ani-postgres
    ani.deploy/profile: isolated
spec:
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
  selector:
    app.kubernetes.io/name: ani-postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ani-postgres
  namespace: ani-data
  labels:
    app.kubernetes.io/name: ani-postgres
    ani.deploy/profile: isolated
spec:
  serviceName: ani-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ani-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ani-postgres
        ani.deploy/profile: isolated
    spec:
      securityContext:
        fsGroup: 26
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
        - name: volume-permissions
          image: docker.kubercon.local/common/mirror/busybox:latest
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              mkdir -p /var/lib/postgresql/data/pgdata
              chown -R 26:26 /var/lib/postgresql/data
              chmod 700 /var/lib/postgresql/data/pgdata
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      containers:
        - name: postgres
          image: ghcr.io/cloudnative-pg/postgresql:15.5-1
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 26
            runAsGroup: 26
            allowPrivilegeEscalation: false
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: ani-postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ani-postgres-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: ani-postgres-secret
                  key: POSTGRES_DB
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["sh", "-ec", "pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\""]
            initialDelaySeconds: 10
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local
        resources:
          requests:
            storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ani-redis
  namespace: ani-data
  labels:
    app.kubernetes.io/name: ani-redis
    ani.deploy/profile: isolated
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ani-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ani-redis
        ani.deploy/profile: isolated
    spec:
      containers:
        - name: redis
          image: docker.kubercon.local/common/mirror/redis:8.2.3-alpine
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - exec redis-server --requirepass "$REDIS_PASSWORD"
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ani-redis-secret
                  key: password
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ani-redis
  namespace: ani-data
  labels:
    app.kubernetes.io/name: ani-redis
    ani.deploy/profile: isolated
spec:
  ports:
    - name: redis
      port: 6379
      targetPort: redis
  selector:
    app.kubernetes.io/name: ani-redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  namespace: ani-data
  labels:
    app.kubernetes.io/name: nats
    ani.deploy/profile: isolated
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nats
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nats
        ani.deploy/profile: isolated
    spec:
      containers:
        - name: nats
          image: docker.changqingyun.cn/mirror/nats:2.10-alpine
          imagePullPolicy: IfNotPresent
          args: ["-js"]
          ports:
            - name: nats
              containerPort: 4222
          readinessProbe:
            tcpSocket:
              port: nats
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: ani-data
  labels:
    app.kubernetes.io/name: nats
    ani.deploy/profile: isolated
spec:
  selector:
    app.kubernetes.io/name: nats
  ports:
    - name: nats
      port: 4222
      targetPort: nats
---
apiVersion: v1
kind: Namespace
metadata:
  name: ani-s05-objectstore
  labels:
    app.kubernetes.io/part-of: ani-core
    ani.deploy/profile: isolated
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ani-s05-minio
  namespace: ani-s05-objectstore
  labels:
    app.kubernetes.io/name: minio
    ani.deploy/profile: isolated
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio
        ani.deploy/profile: isolated
    spec:
      containers:
        - name: minio
          image: docker.kubercon.local/common/mirror/minio/minio:RELEASE.2025-09-07T16-13-09Z
          imagePullPolicy: IfNotPresent
          args:
            - server
            - /data
            - --address
            - :9000
            - --console-address
            - :9001
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: ani-s05-minio-root
                  key: access_key_id
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ani-s05-minio-root
                  key: secret_access_key
          ports:
            - name: s3
              containerPort: 9000
            - name: console
              containerPort: 9001
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: s3
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: s3
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ani-s05-minio
  namespace: ani-s05-objectstore
  labels:
    app.kubernetes.io/name: minio
    ani.deploy/profile: isolated
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: minio
  ports:
    - name: s3
      port: 9000
      targetPort: s3
      nodePort: 30900
    - name: console
      port: 9001
      targetPort: console
---
apiVersion: v1
kind: Namespace
metadata:
  name: ani-s06-vectorstore
  labels:
    ani.deploy/profile: isolated
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sprint13-milvus-etcd
  namespace: ani-s06-vectorstore
  labels:
    app.kubernetes.io/name: sprint13-milvus-etcd
    ani.deploy/profile: isolated
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sprint13-milvus-etcd
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sprint13-milvus-etcd
        ani.deploy/profile: isolated
    spec:
      containers:
        - name: etcd
          image: quay.io/coreos/etcd:v3.5.5
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
          args:
            - |
              exec etcd \
                --advertise-client-urls="http://${POD_IP}:2379" \
                --listen-client-urls="http://${POD_IP}:2379,http://localhost:2379" \
                --data-dir=/etcd
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          ports:
            - name: client
              containerPort: 2379
          volumeMounts:
            - name: data
              mountPath: /etcd
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: sprint13-milvus-etcd
  namespace: ani-s06-vectorstore
spec:
  selector:
    app.kubernetes.io/name: sprint13-milvus-etcd
  ports:
    - name: client
      port: 2379
      targetPort: client
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sprint13-milvus-minio
  namespace: ani-s06-vectorstore
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sprint13-milvus-minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sprint13-milvus-minio
        ani.deploy/profile: isolated
    spec:
      containers:
        - name: minio
          image: docker.kubercon.local/common/mirror/minio/minio:RELEASE.2025-09-07T16-13-09Z
          imagePullPolicy: IfNotPresent
          args:
            - server
            - /data
            - --console-address
            - :9001
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: sprint13-milvus-minio
                  key: access_key
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sprint13-milvus-minio
                  key: secret_key
          ports:
            - name: api
              containerPort: 9000
            - name: console
              containerPort: 9001
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: sprint13-milvus-minio
  namespace: ani-s06-vectorstore
spec:
  selector:
    app.kubernetes.io/name: sprint13-milvus-minio
  ports:
    - name: api
      port: 9000
      targetPort: api
    - name: console
      port: 9001
      targetPort: console
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sprint13-milvus
  namespace: ani-s06-vectorstore
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sprint13-milvus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sprint13-milvus
        ani.deploy/profile: isolated
    spec:
      containers:
        - name: milvus
          image: docker.changqingyun.cn/mirror/milvusdb/milvus:v2.4.15
          imagePullPolicy: IfNotPresent
          command:
            - milvus
            - run
            - standalone
          env:
            - name: ETCD_ENDPOINTS
              value: sprint13-milvus-etcd.ani-s06-vectorstore.svc.cluster.local:2379
            - name: MINIO_ADDRESS
              value: sprint13-milvus-minio.ani-s06-vectorstore.svc.cluster.local:9000
            - name: MINIO_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: sprint13-milvus-minio
                  key: access_key
            - name: MINIO_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: sprint13-milvus-minio
                  key: secret_key
            - name: COMMON_STORAGETYPE
              value: minio
          ports:
            - name: grpc-rest
              containerPort: 19530
            - name: metrics
              containerPort: 9091
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 18
          volumeMounts:
            - name: data
              mountPath: /var/lib/milvus
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: sprint13-milvus
  namespace: ani-s06-vectorstore
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: sprint13-milvus
  ports:
    - name: grpc-rest
      port: 19530
      targetPort: grpc-rest
      nodePort: 31930
    - name: metrics
      port: 9091
      targetPort: metrics
---
apiVersion: v1
kind: Namespace
metadata:
  name: ani-s07-observability
  labels:
    ani.deploy/profile: isolated
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sprint13-prometheus
  namespace: ani-s07-observability
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sprint13-prometheus-config
  namespace: ani-s07-observability
data:
  prometheus.yml: |
    global:
      scrape_interval: 30s
    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ['127.0.0.1:9090']
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sprint13-prometheus
  namespace: ani-s07-observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sprint13-prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sprint13-prometheus
        ani.deploy/profile: isolated
    spec:
      serviceAccountName: sprint13-prometheus
      containers:
        - name: prometheus
          image: docker.kubercon.local/common/mirror/prom/prometheus:v2.39.1
          imagePullPolicy: IfNotPresent
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
          ports:
            - name: http
              containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: sprint13-prometheus-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: sprint13-prometheus
  namespace: ani-s07-observability
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: sprint13-prometheus
  ports:
    - name: http
      port: 9090
      targetPort: http
      nodePort: 31990
