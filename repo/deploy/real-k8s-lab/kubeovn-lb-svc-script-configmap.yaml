apiVersion: v1
kind: ConfigMap
metadata:
  name: ani-kubeovn-lb-svc-script
  namespace: default
  labels:
    app.kubernetes.io/part-of: ani-platform
    app.kubernetes.io/managed-by: ani-core
    ani.kubercloud.io/live-gate: kubeovn-external-lb
data:
  lb-svc.sh: |-
    #!/usr/bin/env bash
    set -euo pipefail

    ROUTE_TABLE=100

    function exec_cmd() {
        cmd=${*:1:${#}}
        $cmd
        ret=$?
        if [ $ret -ne 0 ]; then
            >&2 echo "failed to exec command \"$cmd\""
            exit $ret
        fi
    }

    function init() {
        ip link set net1 up
        ip link set dev net1 arp off

        if [ "$(ip rule show iif net1 | wc -l)" -eq 0 ]; then
            exec_cmd "ip rule add iif net1 table $ROUTE_TABLE"
        fi
        if [ "$(ip rule show iif eth0 | wc -l)" -eq 0 ]; then
            exec_cmd "ip rule add iif eth0 table $ROUTE_TABLE"
        fi
    }

    function add_eip() {
        for rule in "$@"
        do
            arr=(${rule//,/ })
            eip=${arr[0]}
            eip_without_prefix=(${eip//\// })
            gateway=${arr[1]}

            exec_cmd "ip addr replace $eip dev net1"
            exec_cmd "ip route replace ${eip_without_prefix[0]}/32 dev net1 table $ROUTE_TABLE"
            exec_cmd "ip route replace $gateway dev net1 table $ROUTE_TABLE"
            exec_cmd "ip route replace default via $gateway dev net1 table $ROUTE_TABLE"
            ip link set dev net1 arp on
            arping -c 3 -S "${eip_without_prefix[0]}" -i net1 "$gateway" 2>/dev/null
        done
    }

    function add_dnat() {
        for rule in "$@"
        do
            arr=(${rule//,/ })
            eip=(${arr[0]//\// })
            dport=${arr[1]}
            protocol=${arr[2]}
            internalIp=${arr[3]}
            internalPort=${arr[4]}
            defaultGateway=${arr[5]}
            if iptables-save | grep "PREROUTING" | grep "\-d ${eip[0]}" | grep "p $protocol" | grep "dport $dport" | grep "destination $internalIp:$internalPort"; then
                exit 0
            fi
            exec_cmd "iptables -t nat -A PREROUTING -p $protocol -d ${eip[0]} --dport $dport -j DNAT --to-destination $internalIp:$internalPort"

            exec_cmd "ip route replace $internalIp via $defaultGateway table $ROUTE_TABLE"

            if iptables-save | grep "POSTROUTING" | grep "\-d $internalIp" | grep "MASQUERADE"; then
                exit 0
            fi
            exec_cmd "iptables -t nat -I POSTROUTING -d $internalIp -j MASQUERADE"
        done
    }

    function del_dnat() {
        for rule in "$@"
        do
            arr=(${rule//,/ })
            eip=(${arr[0]//\// })
            dport=${arr[1]}
            protocol=${arr[2]}
            internalIp=${arr[3]}
            internalPort=${arr[4]}

            checkRule="-d ${eip[0]} -p $protocol --dport $dport -j DNAT --to-destination $internalIp:$internalPort"
            if iptables -t nat -C PREROUTING $checkRule > /dev/null 2>&1; then
                exec_cmd "iptables -t nat -D PREROUTING -d ${eip[0]} -p $protocol --dport $dport -j DNAT --to-destination $internalIp:$internalPort"
            fi
        done
    }

    rules=${*:2:${#}}
    opt=$1
    case $opt in
        init)
            echo "init $rules"
            init $rules
            ;;
        eip-add)
            echo "eip-add $rules"
            add_eip $rules
            ;;
        dnat-add)
            echo "dnat-add $rules"
            add_dnat $rules
            ;;
        dnat-del)
            echo "dnat-del rules"
            del_dnat $rules
            ;;
        *)
            echo "Usage: $0 [init|eip-add|dnat-add|dnat-del] ..."
            exit 1
            ;;
    esac
