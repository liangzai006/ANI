apiVersion: v1
kind: ServiceAccount
metadata:
  name: ani-gateway
  namespace: ani-system
  labels:
    app.kubernetes.io/name: ani-gateway
    ani.dev/profile: sprint13-production-shaped
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ani-gateway-core-provider
  labels:
    app.kubernetes.io/name: ani-gateway
    ani.dev/profile: sprint13-production-shaped
rules:
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["nodes", "persistentvolumes", "services", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["services", "persistentvolumeclaims"]
    verbs: ["create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["configmaps", "endpoints", "events", "pods", "pods/attach", "pods/exec", "pods/log", "pods/portforward", "secrets", "serviceaccounts"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods/ephemeralcontainers", "pods/resize", "pods/status"]
    verbs: ["update", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["events.k8s.io"]
    resources: ["events"]
    verbs: ["get", "list", "watch", "create"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["clusterroles", "clusterrolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["kubeovn.io"]
    resources: ["vpcs", "subnets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshotclasses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshotcontents", "volumesnapshots"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ani-gateway-core-provider
  labels:
    app.kubernetes.io/name: ani-gateway
    ani.dev/profile: sprint13-production-shaped
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ani-gateway-core-provider
subjects:
  - kind: ServiceAccount
    name: ani-gateway
    namespace: ani-system
