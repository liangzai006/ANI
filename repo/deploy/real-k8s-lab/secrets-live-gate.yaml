profile: M1-SECRETS-LIVE-A
status: contract
description: >
  Sprint 5 live validation gate for Kubernetes Secret provider writes and
  workload Secret binding visibility through env, file and KubeVirt volume paths.

required_tools:
  - kubectl

required_endpoints:
  - ani_gateway_api_v1
  - kubernetes_api
  - kubevirt_api

live_checks:
  - id: core-create-kubernetes-secret
    command: POST ${ANI_GATEWAY_URL}/secrets with SECRET_PROVIDER_MODE=kubernetes_rest
    pass_condition: response_dev_profile_real_provider
  - id: core-bind-secret-env
    command: POST ${ANI_GATEWAY_URL}/secrets/{secret_id}/bindings env_prefix
    pass_condition: binding_record_created
  - id: core-bind-secret-file
    command: POST ${ANI_GATEWAY_URL}/secrets/{secret_id}/bindings mount_path
    pass_condition: binding_record_created
  - id: kubectl-read-secret
    command: kubectl get secret ${secret_id} -n ${tenant_namespace} -o json
    pass_condition: secret_data_matches_core_request
  - id: pod-secret-env-visible
    command: kubectl apply/wait/logs live Pod with envFrom.secretRef
    pass_condition: pod_logs_include_env_secret_value
  - id: pod-secret-file-visible
    command: kubectl apply/wait/logs live Pod with Secret volume mount
    pass_condition: pod_logs_include_file_secret_value
  - id: kubevirt-vm-secret-volume-accepted
    command: kubectl apply --dry-run=server KubeVirt VM with Secret volume/disk
    pass_condition: kubevirt_accepts_secret_volume_manifest
  - id: kubevirt-vm-secret-volume-guest-visible
    command: kubectl apply/wait/logs live KubeVirt VM with Secret volume/disk and cloud-init guest probe
    pass_condition: guest_console_logs_include_secret_volume_values

readiness_levels:
  contract:
    meaning: Gate definition and documentation are present; no live cluster proof.
  live:
    meaning: Core Secret provider write, Pod env/file visibility and KubeVirt VM Secret volume guest visibility passed in a real lab.
  production_like:
    meaning: Live checks, failure recovery, security hardening and workload lifecycle evidence are present.
