apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: lb-svc-attachment
  namespace: kube-system
spec:
  config: |-
    {
      "cniVersion": "0.3.0",
      "type": "macvlan",
      "master": "bond0",
      "mode": "bridge"
    }
---
apiVersion: kubeovn.io/v1
kind: Subnet
metadata:
  name: attach-subnet
  labels:
    app.kubernetes.io/part-of: ani-platform
    app.kubernetes.io/managed-by: ani-core
    ani.kubercloud.io/live-gate: kubeovn-external-lb
spec:
  protocol: IPv4
  provider: lb-svc-attachment.kube-system
  enableExternalLBAddress: true
  cidrBlock: 10.10.0.0/22
  gateway: 10.10.3.254
  excludeIps:
    - 10.10.0.0..10.10.1.249
    - 10.10.1.251..10.10.3.255
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ani-kubeovn-external-lb-smoke
  namespace: default
  labels:
    app.kubernetes.io/part-of: ani-platform
    app.kubernetes.io/managed-by: ani-core
    ani.kubercloud.io/live-gate: kubeovn-external-lb
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ani-kubeovn-external-lb-smoke
  template:
    metadata:
      labels:
        app: ani-kubeovn-external-lb-smoke
    spec:
      containers:
        - name: http
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /tmp/www
              printf 'ani-kubeovn-external-lb-ok\n' > /tmp/www/index.html
              exec httpd -f -p 8080 -h /tmp/www
          ports:
            - name: http
              containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: ani-kubeovn-external-lb-smoke
  namespace: default
  labels:
    app.kubernetes.io/part-of: ani-platform
    app.kubernetes.io/managed-by: ani-core
    ani.kubercloud.io/live-gate: kubeovn-external-lb
  annotations:
    lb-svc-attachment.kube-system.kubernetes.io/logical_switch: attach-subnet
    ovn.kubernetes.io/attachmentprovider: lb-svc-attachment.kube-system
spec:
  type: LoadBalancer
  loadBalancerIP: 10.10.1.250
  selector:
    app: ani-kubeovn-external-lb-smoke
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
