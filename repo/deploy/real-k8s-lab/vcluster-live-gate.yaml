profile: M1-K8S-LIVE-A
status: contract
description: >
  Sprint 5 vCluster live validation gate for proving Helm install,
  vCluster kubeconfig usability and Core proxy access against REAL-K8S-LAB-A.

required_tools:
  - helm
  - vcluster
  - kubectl

live_checks:
  - id: helm-install
    command: helm upgrade --install {cluster_id} vcluster --repo https://charts.loft.sh --namespace {namespace} --create-namespace --repository-config= --set sync.toHost.services.enabled=true --version 0.34.1
    pass_condition: command_succeeds
  - id: vcluster-kubeconfig
    command: vcluster connect {cluster_id} --namespace {namespace} --background-proxy=false -- kubectl get --raw /version
    pass_condition: vcluster_connect_runs_kubectl_with_generated_kubeconfig
  - id: kubectl-version
    command: vcluster connect {cluster_id} --namespace {namespace} --background-proxy=false -- kubectl get --raw /version
    pass_condition: json_has_kubernetes_version
  - id: vcluster-workload-create
    command: kubectl create deployment ani-s02-live-workload --image registry.k8s.io/pause:3.10 --replicas 1
    pass_condition: temporary_deployment_created_in_vcluster_default_namespace
  - id: core-cluster-register
    command: POST {gateway_url}/k8s-clusters name={cluster_id}
    pass_condition: http_2xx_response_has_cluster_id
  - id: core-proxy-version
    command: POST {gateway_url}/k8s-clusters/{core_cluster_id}/proxy path=/version
    pass_condition: http_2xx
  - id: core-workloads-list
    command: GET {gateway_url}/k8s-clusters/{core_cluster_id}/workloads?namespace=default&kind=Deployment
    pass_condition: http_2xx_response_observes_ani_s02_live_workload
  - id: vcluster-workload-cleanup
    command: kubectl delete deployment ani-s02-live-workload --ignore-not-found=true
    pass_condition: temporary_deployment_deleted_from_vcluster_default_namespace

readiness_levels:
  contract:
    meaning: Gate definition and local validator exist; no live vCluster proof.
  live:
    meaning: Helm install, vCluster kubeconfig and Core proxy checks passed against REAL-K8S-LAB-A.
