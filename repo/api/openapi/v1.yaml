openapi: 3.1.0

info:
  title: KuberCloud ANI Core API
  version: 1.0.0
  description: |
    KuberCloud ANI Core — 基础设施平台 REST API 契约（唯一真实来源）。

    ## 文件范围与边界
    本文件（api/openapi/v1.yaml）仅包含 ANI Core 基础设施资源：
    instances（VM/Container/GPU/Sandbox/BM/K8s集群）、volumes/filesystems/objects/
    vector-stores、networks、auth/secrets/encryption、gpu-inventory/dpu-inventory、
    registry/metering/observability/notifications/audit 等。
    ANI Services 资源（模型仓库/推理/知识库/PaaS）在 api/openapi/services/v1.yaml。

    ## URL 前缀规范
    servers[0].url = "https://{host}/api/v1"（前缀在 spec 中定义，Gateway 不做路径变换）。
    版本升级时新建 api/openapi/v2.yaml，本文件路径保持稳定。

    ## SDK 生成（make gen-core-sdk）
    Go: github.com/kubercloud/ani-go | Python: pip install kubercloud-ani
    TypeScript: @kubercloud/ani-client | Java: com.kubercloud:ani-java

    ## 认证
    Bearer JWT（1小时有效）或 X-API-Key Header。
    tenant_id 从 JWT claims 提取，请求体中的 tenant_id 字段将被忽略。

    ## 错误格式
    `{ code: string, message: string, request_id: string, details?: object }`
    标准错误码：UNAUTHORIZED / FORBIDDEN / NOT_FOUND / CONFLICT / BAD_REQUEST /
    RATE_LIMIT_EXCEEDED / NOT_IMPLEMENTED / INTERNAL_ERROR

    ## 分页
    cursor 分页：`?limit=20&cursor=<token>` → `{ items: [], next_cursor: string | null }`

    ## 异步操作
    202 响应体返回 AsyncTask，Location Header 附任务 URL。
    轮询 GET /api/v1/tasks/{task_id} 或配置 Webhook。

    ## ⚠️ V8 迁移注解
    /models、/inference-services、/knowledge-bases 为历史遗留路径，逻辑属 ANI Services，
    将在 SPEC-SPLIT-A 批次迁移至 api/openapi/services/v1.yaml，迁移前暂时保留。

servers:
  - url: https://{host}/api/v1
    variables:
      host:
        default: ani.internal
        description: ANI Gateway 地址（支持IP地址）

# ── 认证方式 ─────────────────────────────────────────────────────────────────
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT AccessToken（有效期1小时，通过 /auth/token 获取）
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: 长期 API Key（在 Console → 设置 → API Key 中创建）

# ── 公共 Schema ───────────────────────────────────────────────────────────────
  schemas:

    # 所有错误响应的统一格式
    ErrorResponse:
      type: object
      required: [code, message, request_id]
      properties:
        code:        { type: string, example: "MODEL_NOT_FOUND" }
        message:     { type: string, example: "模型 qwen2.5-72b 不存在" }
        request_id:  { type: string, example: "req_01j8xabc" }
        details:     { type: object, additionalProperties: true }

    # Cursor 分页（所有列表接口统一使用此格式）
    CursorPage:
      type: object
      required: [items, total]
      properties:
        total:       { type: integer, description: "总记录数（用于显示）", example: 42 }
        next_cursor: { type: string, nullable: true, description: "下一页游标；null 表示已到最后一页" }

    # 异步任务（统一格式，202 响应一律返回此 schema）
    AsyncTask:
      type: object
      required: [id, idempotency_key, task_type, status, created_at]
      properties:
        id:               { type: string, format: uuid }
        idempotency_key:  { type: string, description: "客户端提供的幂等键" }
        task_type:        { type: string, example: "model.import",
                            enum: [model.import, kb.parse, kb.index, inference.deploy] }
        resource_type:    { type: string, nullable: true,
                            enum: [inference_service, kb_document, model_version] }
        resource_id:      { type: string, format: uuid, nullable: true }
        status:           { type: string,
                            enum: [pending, running, completed, failed, cancelled, dead_letter] }
        attempt_count:    { type: integer, minimum: 0 }
        max_attempts:     { type: integer, minimum: 1 }
        progress_pct:     { type: integer, minimum: 0, maximum: 100 }
        result:           { type: object, nullable: true }
        error_message:    { type: string, nullable: true }
        dead_letter_at:   { type: string, format: date-time, nullable: true }
        created_at:       { type: string, format: date-time }
        completed_at:     { type: string, format: date-time, nullable: true }

    # Demo/Services schemas 已迁移：
    # - DemoInstance/DemoCreateInstanceRequest → api/openapi/dev.yaml
    # - Model/InferenceService/KnowledgeBase → api/openapi/services/v1.yaml
    # （SPEC-SPLIT-A 过渡期，路径仍在本文件，schemas 已移走）

    # ── ANI Core 基础设施 Schemas ─────────────────────────────────────────────

    HealthCheck:
      type: object
      required: [status, checks]
      properties:
        status:  { type: string, enum: [ok, degraded, error] }
        version: { type: string, example: "v0.8.0" }
        checks:
          type: object
          additionalProperties:
            type: object
            properties:
              status:     { type: string, enum: [ok, fail] }
              latency_ms: { type: integer }
              error:      { type: string, nullable: true }

    InstanceRecord:
      type: object
      description: ANI Core 计算实例（VM/Container/GPU/Sandbox/BM/K8s集群/Batch）
      required: [id, tenant_id, name, kind, state, provider, created_at, updated_at]
      properties:
        id:             { type: string }
        tenant_id:      { type: string }
        name:           { type: string }
        kind:           { type: string, enum: [vm, container, gpu_container, sandbox, batch_job, notebook, k8s_cluster, bare_metal, dpu_node] }
        state:          { type: string, enum: [pending, provisioning, starting, running, stopping, stopped, failed, deleting, deleted] }
        state_reason:   { type: string, nullable: true, description: "机器可读的状态原因码，如 InsufficientGPU" }
        state_message:  { type: string, nullable: true, description: "人类可读的状态描述" }
        provider:       { type: string, example: "kubernetes_rest" }
        audit_id:       { type: string, nullable: true }
        resource_refs:  { type: array, items: { type: string } }
        endpoint:       { type: string, nullable: true }
        node_name:      { type: string, nullable: true }
        termination_protection: { type: boolean, default: false, description: "VM 危险操作保护开关；开启后 stop/delete/rebuild 等操作必须先关闭保护" }
        ssh:
          type: object
          nullable: true
          description: "VM SSH 连接信息；仅返回连接元数据，不返回私钥"
          required: [username, host, port, ready]
          properties:
            username: { type: string, example: "ubuntu" }
            host:     { type: string, nullable: true }
            port:     { type: integer, default: 22 }
            key_ref:  { type: string, nullable: true, description: "SSH key/secret 引用；不包含私钥内容" }
            ready:    { type: boolean, description: "连接信息是否已可用于发起 SSH" }
            reason:   { type: string, nullable: true }
        volumes:
          type: array
          items:
            type: object
            required: [name, kind]
            properties:
              name:       { type: string }
              kind:       { type: string, enum: [root_disk, data_disk, shared_pvc, object_fuse, ephemeral] }
              size_gib:   { type: integer, format: int64 }
              source_ref: { type: string, nullable: true }
              mount_path: { type: string, nullable: true }
              read_only:  { type: boolean, default: false }
        container:
          type: object
          nullable: true
          description: "Container/GPU Container 部署状态摘要"
          properties:
            replicas:       { type: integer, minimum: 0, default: 1 }
            ready_replicas: { type: integer, minimum: 0, default: 0 }
            revision:       { type: string, nullable: true }
            rollout_status: { type: string, nullable: true, enum: [pending, progressing, healthy, degraded, rolled_back] }
            history:
              type: array
              items:
                type: object
                required: [revision, created_at]
                properties:
                  revision:   { type: string }
                  image:      { type: string, nullable: true }
                  created_at: { type: string, format: date-time }
        gpu:
          type: object
          nullable: true
          description: "GPU container 调度和利用率状态"
          properties:
            vendor:                { type: string, nullable: true }
            model:                 { type: string, nullable: true }
            count:                 { type: integer, minimum: 0 }
            scheduling_reason:     { type: string, nullable: true }
            utilization_percent:   { type: number, format: float, minimum: 0, maximum: 100, nullable: true }
        snapshots:
          type: array
          description: "VM 快照元数据；provider-native 快照执行后续通过 reconcile 对齐"
          items:
            type: object
            required: [id, name, source_instance_id, state, created_at]
            properties:
              id:                 { type: string }
              name:               { type: string }
              source_instance_id: { type: string }
              state:              { type: string, enum: [creating, ready, failed, deleting, deleted] }
              reason:             { type: string, nullable: true }
              created_at:         { type: string, format: date-time }
              ready_at:           { type: string, format: date-time, nullable: true }
        created_at:     { type: string, format: date-time }
        updated_at:     { type: string, format: date-time }

    InstanceOperation:
      type: object
      description: 实例操作记录（创建/启动/停止/变配/删除等）
      required: [id, instance_id, tenant_id, operation, status, requested_by, created_at]
      properties:
        id:               { type: string }
        instance_id:      { type: string }
        tenant_id:        { type: string }
        operation:        { type: string, enum: [create, start, stop, restart, resize, rebuild, delete, snapshot, attach_volume, detach_volume, rollback, console_session] }
        status:           { type: string, enum: [accepted, in_progress, succeeded, failed, cancelled] }
        idempotency_key:  { type: string, nullable: true, description: "客户端提供的幂等键" }
        requested_by:     { type: string, description: "发起操作的用户 ID" }
        precheck_result:  { type: object, nullable: true }
        failure_reason:   { type: string, nullable: true }
        failure_message:  { type: string, nullable: true }
        retry_eligible:   { type: boolean, default: false }
        steps:
          type: array
          items:
            type: object
            required: [step_name, status]
            properties:
              step_name:    { type: string, example: "admission_check" }
              status:       { type: string, enum: [pending, running, succeeded, failed, skipped] }
              message:      { type: string, nullable: true }
              started_at:   { type: string, format: date-time, nullable: true }
              completed_at: { type: string, format: date-time, nullable: true }
        before_spec:      { type: object, nullable: true, description: "变更前的实例规格快照（用于 diff）" }
        after_spec:       { type: object, nullable: true, description: "变更后的实例规格快照" }
        created_at:       { type: string, format: date-time }
        updated_at:       { type: string, format: date-time }

    InstanceListResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/InstanceRecord' }
        total:       { type: integer }
        next_cursor: { type: string, nullable: true }

    CreateInstanceRequest:
      type: object
      required: [name, kind, idempotency_key]
      properties:
        idempotency_key: { type: string, minLength: 1, maxLength: 128, description: "客户端生成；同一 tenant_id 下 24 小时内去重" }
        name:           { type: string, minLength: 1, maxLength: 128 }
        kind:           { type: string, enum: [vm, container, gpu_container] }
        image:          { type: string, nullable: true, description: "容器镜像或运行时镜像引用" }
        cpu:            { type: string, example: "2" }
        memory:         { type: string, example: "4Gi" }
        auto_start:     { type: boolean, default: true }
        boot_image:     { type: string, nullable: true, description: "VM boot image 引用" }
        ssh_username:   { type: string, nullable: true, default: "ubuntu", description: "VM SSH 用户名；仅 VM 使用" }
        ssh_key_ref:    { type: string, nullable: true, description: "VM SSH key/secret 引用；不包含私钥内容" }
        termination_protection: { type: boolean, default: false }
        gpu:
          type: object
          nullable: true
          properties:
            vendor: { type: string, example: "nvidia" }
            model:  { type: string, example: "A100" }
            count:  { type: integer, minimum: 1, default: 1 }
        replicas:
          type: integer
          minimum: 1
          default: 1
          description: "Container/GPU Container 副本数；VM 固定为 1"

    CreateInstanceResponse:
      type: object
      required: [instance, operation_id]
      properties:
        instance:     { $ref: '#/components/schemas/InstanceRecord' }
        operation_id: { type: string }
        audit_id:     { type: string, nullable: true }

    InstanceLifecycleRequest:
      type: object
      required: [action, idempotency_key]
      properties:
        action:
          type: string
          enum: [start, stop, restart, resize, rebuild, delete, snapshot, attach_volume, detach_volume, rollback]
        idempotency_key: { type: string, minLength: 1, maxLength: 128 }
        cpu:            { type: string, nullable: true, description: "resize 时使用" }
        memory:         { type: string, nullable: true, description: "resize 时使用" }
        snapshot_name:  { type: string, nullable: true, description: "snapshot 时指定快照名称；为空时由本地 profile 生成" }
        revision:       { type: string, nullable: true, description: "rollback 时指定目标 revision；为空时回滚上一版本" }
        volume_id:      { type: string, nullable: true, description: "attach_volume/detach_volume 时使用" }

    InstanceLifecycleResponse:
      type: object
      required: [instance, operation_id]
      properties:
        instance:     { $ref: '#/components/schemas/InstanceRecord' }
        operation_id: { type: string }

    CreateInstanceConsoleSessionRequest:
      type: object
      properties:
        protocol: { type: string, enum: [console, vnc, novnc, serial], default: "vnc" }

    InstanceConsoleSession:
      type: object
      required: [session_id, protocol, connect_url, url, expires_at]
      properties:
        operation_id: { type: string, nullable: true, description: "对应 operation timeline，可通过 /instance-operations/{operation_id} 查询" }
        session_id:  { type: string }
        protocol:    { type: string, enum: [console, vnc, novnc, serial] }
        connect_url: { type: string }
        url:         { type: string, description: "连接 URL，和 connect_url 等价，供 Console/SDK 直接使用" }
        expires_at:  { type: string, format: date-time }

    BeginOIDCLoginRequest:
      type: object
      required: [tenant_name, redirect_uri]
      properties:
        tenant_name:  { type: string, description: "租户 slug，用于限定登录上下文" }
        redirect_uri: { type: string, format: uri, description: "Console/CLI 注册的 OIDC callback 地址" }

    BeginOIDCLoginResponse:
      type: object
      required: [authorization_url, state]
      properties:
        authorization_url: { type: string, format: uri }
        state:            { type: string }

    CompleteOIDCLoginRequest:
      type: object
      required: [state, code, redirect_uri]
      properties:
        state:        { type: string }
        code:         { type: string }
        redirect_uri: { type: string, format: uri }

    TokenPairResponse:
      type: object
      required: [access_token, refresh_token, expires_in]
      properties:
        access_token:  { type: string }
        refresh_token: { type: string }
        expires_in:    { type: integer, example: 3600 }
        issued_at:     { type: string, format: date-time }

    RefreshAccessTokenRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token: { type: string }

    RefreshAccessTokenResponse:
      type: object
      required: [access_token, expires_in]
      properties:
        access_token: { type: string }
        expires_in:   { type: integer, example: 3600 }

    LogoutRequest:
      type: object
      required: [jti]
      properties:
        jti: { type: string, description: "JWT ID，调用方从当前 AccessToken claims 中读取" }

    RevokeStatusResponse:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [revoked] }

    CreateAPIKeyRequest:
      type: object
      required: [name, scopes]
      properties:
        name:           { type: string, maxLength: 128 }
        user_id:        { type: string, description: "可选；为空时使用当前认证用户" }
        scopes:
          type: array
          minItems: 1
          items: { type: string, pattern: "^scope:[a-z0-9_-]+:(\\*|[a-z0-9_-]+)$" }
        rate_limit_rpm: { type: integer, minimum: 1, maximum: 10000, default: 60 }
        expires_at:     { type: string, format: date-time }

    CreateAPIKeyResponse:
      type: object
      required: [key_id, key_value, key_prefix]
      properties:
        key_id:     { type: string }
        key_value:  { type: string, description: "仅创建时返回一次，服务端不保存明文" }
        key_prefix: { type: string }

    APIKeyInfo:
      type: object
      required: [id, name, key_prefix, scopes, rate_limit_rpm, is_active]
      properties:
        id:             { type: string }
        name:           { type: string }
        key_prefix:     { type: string }
        scopes:
          type: array
          items: { type: string }
        rate_limit_rpm: { type: integer }
        created_at:     { type: string, format: date-time }
        expires_at:     { type: string, format: date-time, nullable: true }
        last_used_at:   { type: string, format: date-time, nullable: true }
        is_active:      { type: boolean }

    ListAPIKeysResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/APIKeyInfo' }
        total: { type: integer }

  # 公共响应
  responses:
    Unauthorized:
      description: 未认证或 Token 无效（code=UNAUTHORIZED）
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Forbidden:
      description: 无权访问该资源（code=FORBIDDEN）
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NotFound:
      description: 资源不存在（code=NOT_FOUND）
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    BadRequest:
      description: 请求参数不合法（code=BAD_REQUEST）
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Conflict:
      description: 资源已存在或冲突（code=CONFLICT）
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    RateLimitExceeded:
      description: 超出速率限制（code=RATE_LIMIT_EXCEEDED）
      headers:
        Retry-After:
          schema: { type: integer }
          description: "建议等待的秒数"
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

security:
  - BearerAuth: []
  - ApiKeyAuth: []

# ── API 路径定义 ──────────────────────────────────────────────────────────────
# 说明：/demo/* 路径已迁移至 api/openapi/dev.yaml（不参与 SDK 生成）
#       /models /inference-services /knowledge-bases 为过渡期路径，
#       将在 SPEC-SPLIT-A 批次迁移至 api/openapi/services/v1.yaml
paths:

  # ── 健康检查（K8s probe 必须）──────────────────────────────────────────────
  /healthz:
    get:
      operationId: liveness
      summary: Liveness probe（进程存活检查）
      description: |
        K8s liveness probe 端点。只要进程能响应即返回 200。
        不检查依赖（Postgres/NATS/Redis），仅表示"进程在运行"。
        不需要认证。
      tags: [Health]
      security: []
      responses:
        "200":
          description: 进程存活
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:   { type: string, enum: [ok], example: "ok" }
                  version:  { type: string, example: "v0.8.0" }
                  build_at: { type: string, format: date-time }
        "503":
          description: 进程异常（极少见，进程若能响应通常返回200）
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /readyz:
    get:
      operationId: readiness
      summary: Readiness probe（服务就绪检查）
      description: |
        K8s readiness probe 端点。检查所有关键依赖是否可用。
        任一依赖不可用则返回 503，此时 K8s 从 LB 摘除该实例。
        不需要认证。
      tags: [Health]
      security: []
      responses:
        "200":
          description: 服务就绪，可接受流量
          content:
            application/json:
              schema:
                type: object
                required: [status, checks]
                properties:
                  status: { type: string, enum: [ok, degraded] }
                  checks:
                    type: object
                    description: 各依赖的健康状态
                    additionalProperties:
                      type: object
                      properties:
                        status:  { type: string, enum: [ok, fail] }
                        latency_ms: { type: integer }
                        error:   { type: string, nullable: true }
                    example:
                      postgres:  { status: ok, latency_ms: 3 }
                      nats:      { status: ok, latency_ms: 1 }
                      redis:     { status: ok, latency_ms: 1 }
        "503":
          description: 服务未就绪（至少一个依赖不可用）
          content:
            application/json:
              schema:
                type: object
                required: [status, checks]
                properties:
                  status: { type: string, enum: [degraded, error] }
                  checks: { type: object, additionalProperties: true }

  # ── 认证 ────────────────────────────────────────────────────────────────────
  /auth/oidc/begin:
    post:
      operationId: beginOIDCLogin
      summary: 发起 OIDC 登录
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BeginOIDCLoginRequest' }
      responses:
        "200":
          description: 返回 Dex/OIDC 授权地址
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BeginOIDCLoginResponse' }
        "400": { $ref: '#/components/responses/BadRequest' }

  /auth/token:
    post:
      operationId: completeOIDCLogin
      summary: OIDC callback 换取 TokenPair
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CompleteOIDCLoginRequest' }
      responses:
        "200":
          description: OIDC 登录完成
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenPairResponse' }
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }

  /auth/refresh:
    post:
      summary: 刷新 AccessToken
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RefreshAccessTokenRequest' }
      responses:
        "200":
          description: 刷新成功
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RefreshAccessTokenResponse' }
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }

  /auth/logout:
    post:
      operationId: logout
      summary: 吊销当前 JWT JTI
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LogoutRequest' }
      responses:
        "200":
          description: Token 已吊销
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RevokeStatusResponse' }
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }

  /auth/api-keys:
    get:
      operationId: listAPIKeys
      summary: 列出当前租户 API Key
      tags: [Auth]
      parameters:
        - name: user_id
          in: query
          required: false
          schema: { type: string }
      responses:
        "200":
          description: API Key 列表
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ListAPIKeysResponse' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
    post:
      operationId: createAPIKey
      summary: 创建 API Key
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateAPIKeyRequest' }
      responses:
        "201":
          description: API Key 创建成功
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CreateAPIKeyResponse' }
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }

  /auth/api-keys/{key_id}:
    delete:
      operationId: revokeAPIKey
      summary: 吊销 API Key
      tags: [Auth]
      parameters:
        - name: key_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: API Key 已吊销
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status: { type: string, enum: [revoked] }
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }

  # ── 计算实例（Core API Alpha）──────────────────────────────────────────────
  /instances:
    get:
      operationId: listInstances
      summary: 查询实例列表
      description: |
        Services P0 依赖路径。返回 VM、container、gpu_container 的 Core 统一实例视图。
        当前 Alpha 冻结 path/schema/error/state/RBAC scope；dev/local profile 可使用本地 provider。
      tags: [Instances]
      x-ani-rbac-scope: "scope:instances:read"
      parameters:
        - { name: kind,   in: query, schema: { type: string, enum: [vm, container, gpu_container] } }
        - { name: limit,  in: query, schema: { type: integer, default: 20, minimum: 1, maximum: 100 } }
        - { name: cursor, in: query, schema: { type: string } }
      responses:
        "200":
          description: 实例列表
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InstanceListResponse' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }

    post:
      operationId: createInstance
      summary: 创建实例
      description: |
        创建 VM、container 或 gpu_container。POST 创建必须携带 idempotency_key；
        同一 (tenant_id, idempotency_key) 在 24 小时内返回同一操作结果。
      tags: [Instances]
      x-ani-rbac-scope: "scope:instances:create"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateInstanceRequest' }
      responses:
        "201":
          description: 实例创建已提交并返回当前状态
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CreateInstanceResponse' }
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "409": { $ref: '#/components/responses/Conflict' }

  /instances/{instance_id}:
    get:
      operationId: getInstance
      summary: 查询实例详情
      tags: [Instances]
      x-ani-rbac-scope: "scope:instances:read"
      parameters:
        - { name: instance_id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: 实例详情
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InstanceRecord' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }

  /instances/{instance_id}/lifecycle:
    post:
      operationId: applyInstanceLifecycle
      summary: 执行实例生命周期操作
      description: |
        执行 start/stop/restart/resize/rebuild/delete/snapshot/attach_volume/detach_volume/rollback。
        stop/delete 等有副作用操作必须携带 idempotency_key，VM 开启 termination_protection
        时危险操作返回 CONFLICT，并在 operation precheck 中记录拒绝原因。
      tags: [Instances]
      x-ani-rbac-scope: "scope:instances:update"
      parameters:
        - { name: instance_id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/InstanceLifecycleRequest' }
      responses:
        "200":
          description: 操作已接受并返回实例当前状态
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InstanceLifecycleResponse' }
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
        "409": { $ref: '#/components/responses/Conflict' }

  /instances/{instance_id}/console:
    post:
      operationId: createInstanceConsoleSession
      summary: 申请 VM console/VNC session
      description: 返回短期 console/VNC/serial session 信息；不暴露 provider 长期凭据。
      tags: [Instances]
      x-ani-rbac-scope: "scope:instances:console"
      parameters:
        - { name: instance_id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateInstanceConsoleSessionRequest' }
      responses:
        "200":
          description: console session
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InstanceConsoleSession' }
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }

  # ── 平台品牌化 ──────────────────────────────────────────────────────────────
  /branding:
    get:
      summary: 获取平台品牌配置
      tags: [Branding]
      security: []     # 无需认证，首屏加载需要
      responses:
        "200":
          description: 品牌配置
          content:
            application/json:
              schema:
                properties:
                  platform_name:  { type: string }
                  logo_light_url: { type: string, format: uri }
                  logo_dark_url:  { type: string, format: uri }
                  favicon_url:    { type: string, format: uri }
                  primary_color:  { type: string, example: "#1677FF" }
                  secondary_color:{ type: string }
                  icp_number:     { type: string }

  # ── 模型管理 ────────────────────────────────────────────────────────────────
  /models:
    get:
      operationId: listModels
      summary: 获取模型列表
      tags: [Models]
      parameters:
        - { name: status, in: query, schema: { type: string,
            enum: [pending, downloading, ready, error, deleted] } }
        - { name: limit, in: query, schema: { type: integer, default: 20, minimum: 1, maximum: 100 } }
        - { name: cursor, in: query, schema: { type: string }, description: "上一页返回的 next_cursor" }
      responses:
        "200":
          description: 模型列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CursorPage'
                  - properties:
                      items: { type: array, items: { $ref: '#/components/schemas/Model' } }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }

    post:
      operationId: createModel
      summary: 创建模型元数据记录（上传文件前必须先调用此接口）
      tags: [Models]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required: [name, display_name]
              properties:
                name:
                  type: string
                  pattern: '^[a-z0-9][a-z0-9.-]{0,62}$'
                  description: "模型唯一标识（仅小写字母/数字/点/连字符，1-63字符）"
                display_name: { type: string, minLength: 1, maxLength: 128 }
                description:  { type: string, maxLength: 1024 }
                capabilities:
                  type: array
                  items: { type: string, enum: [text-generation, embedding, speech-to-text] }
      responses:
        "201":
          description: 模型记录已创建
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Model' }
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "409": { $ref: '#/components/responses/Conflict' }

  /models/import:
    post:
      operationId: importModel
      summary: 从 HuggingFace 或 ModelScope 异步导入模型
      description: |
        提交后立即返回 202 和 AsyncTask。
        客户端应轮询 GET /api/v1/tasks/{task_id} 或配置 webhook_url 接收完成通知。
        使用 idempotency_key 防止重复导入：相同 key 的第二次调用直接返回已有任务。
      tags: [Models]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required: [source, repo_id, idempotency_key]
              properties:
                source:
                  type: string
                  enum: [huggingface, modelscope]
                repo_id:
                  type: string
                  example: "Qwen/Qwen2.5-72B-Instruct"
                  minLength: 3
                  maxLength: 256
                revision:
                  type: string
                  default: "main"
                  description: "分支/Tag/commit hash，默认 main"
                idempotency_key:
                  type: string
                  maxLength: 128
                  description: "客户端生成的唯一键，防止重复提交"
                webhook_url:
                  type: string
                  format: uri
                  description: "任务完成后回调的 URL（可选）"
      responses:
        "202":
          description: 导入任务已提交
          headers:
            Location:
              schema: { type: string }
              description: "GET /api/v1/tasks/{task_id} 的完整路径"
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AsyncTask' }
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }

  /models/{model_id}:
    get:
      summary: 获取模型详情
      tags: [Models]
      parameters:
        - { name: model_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Model' }
        "404":
          $ref: '#/components/responses/NotFound'

    delete:
      summary: 删除模型
      tags: [Models]
      parameters:
        - { name: model_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "204":
          description: 已删除

  /models/{model_id}/versions:
    post:
      summary: 上传模型版本（分片上传完成后调用）
      tags: [Models]
      parameters:
        - { name: model_id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required: [version, format, storage_path, checksum_sha256, size_bytes]
              properties:
                version:         { type: string }
                format:          { type: string, enum: [safetensors, gguf, pytorch] }
                storage_path:    { type: string }
                checksum_sha256: { type: string }
                size_bytes:      { type: integer }
                is_encrypted:    { type: boolean, default: false }
                encrypt_algo:    { type: string }
                encrypt_hint:    { type: string }
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ModelVersion' }

  # ── 推理服务 ────────────────────────────────────────────────────────────────
  /inference-services:
    get:
      summary: 获取推理服务列表
      tags: [InferenceServices]
      responses:
        "200":
          content:
            application/json:
              schema:
                properties:
                  items: { type: array, items: { $ref: '#/components/schemas/InferenceService' } }

    post:
      summary: 部署推理服务（异步）
      tags: [InferenceServices]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required: [name, model]
              properties:
                name:              { type: string }
                model:             { type: string, description: "格式: name:version" }
                replicas:          { type: integer, default: 1 }
                gpu_type:          { type: string }
                gpu_count_per_pod: { type: integer, default: 1 }
                max_concurrency:   { type: integer, default: 8 }
                placement:
                  type: object
                  properties:
                    region: { type: string }
                    az:     { type: string }
                encryption_key_secret:
                  type: string
                  description: "K8s Secret 名称，含模型解密密钥（加密模型必填）"
      responses:
        "202":
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InferenceService' }

  /inference-services/{service_id}:
    get:
      summary: 获取推理服务详情
      tags: [InferenceServices]
      parameters:
        - { name: service_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InferenceService' }

    delete:
      summary: 停止并删除推理服务
      tags: [InferenceServices]
      parameters:
        - { name: service_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "202":
          description: 停止任务已提交

  # ── 知识库 ──────────────────────────────────────────────────────────────────
  /knowledge-bases:
    get:
      summary: 知识库列表
      tags: [KnowledgeBases]
      responses:
        "200":
          content:
            application/json:
              schema:
                properties:
                  items: { type: array, items: { $ref: '#/components/schemas/KnowledgeBase' } }

    post:
      summary: 创建知识库
      tags: [KnowledgeBases]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required: [name]
              properties:
                name:            { type: string }
                description:     { type: string }
                embedding_model: { type: string, default: "bge-m3" }
                chunk_size:      { type: integer, default: 512 }
                top_k:           { type: integer, default: 5 }
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: '#/components/schemas/KnowledgeBase' }

  /knowledge-bases/{kb_id}/documents:
    get:
      summary: 文档列表
      tags: [KnowledgeBases]
      parameters:
        - { name: kb_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          content:
            application/json:
              schema:
                properties:
                  items: { type: array, items: { $ref: '#/components/schemas/KBDocument' } }

    post:
      summary: 上传文档（multipart/form-data）
      tags: [KnowledgeBases]
      parameters:
        - { name: kb_id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              required: [file]
              properties:
                file: { type: string, format: binary }
      responses:
        "202":
          description: 文档已上传，解析任务进行中
          content:
            application/json:
              schema: { $ref: '#/components/schemas/KBDocument' }

  /knowledge-bases/{kb_id}/query:
    post:
      operationId: queryKnowledgeBase
      summary: 知识库问答（JSON，非流式）
      description: |
        混合 RAG 问答：向量检索 + 关键词检索 + RRF 融合 + LLM 生成。
        当所有候选 chunk 的相关性分数均低于 score_threshold 时，
        返回 `{ answer: "未找到相关内容，请联系管理员确认。", sources: [] }`
        而不是编造答案。
        流式版本请使用 GET /knowledge-bases/{kb_id}/query/stream
      tags: [KnowledgeBases]
      parameters:
        - { name: kb_id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required: [question, idempotency_key]
              properties:
                question:
                  type: string
                  minLength: 1
                  maxLength: 2000
                  example: "差旅报销标准是什么？"
                session_id:
                  type: string
                  format: uuid
                  nullable: true
                  description: "多轮对话会话 ID；为空时创建新会话"
                idempotency_key:
                  type: string
                  maxLength: 128
                  description: "防止重复提交同一问题（网络重试时避免重复计费）"
                top_k:
                  type: integer
                  default: 5
                  minimum: 1
                  maximum: 20
                score_threshold:
                  type: number
                  format: float
                  default: 0.3
                  minimum: 0.0
                  maximum: 1.0
      responses:
        "200":
          description: JSON 格式的问答结果
          content:
            application/json:
              schema: { $ref: '#/components/schemas/KBQueryResponse' }
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "404": { $ref: '#/components/responses/NotFound' }

  # SSE 流式问答使用独立端点，避免同一 path 混用 JSON 和 event-stream（SDK 生成会混乱）
  /knowledge-bases/{kb_id}/query/stream:
    get:
      operationId: streamQueryKnowledgeBase
      summary: 知识库问答（SSE 流式，适合长回答和前端打字机效果）
      tags: [KnowledgeBases]
      parameters:
        - { name: kb_id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: question, in: query, required: true, schema: { type: string, minLength: 1, maxLength: 2000 } }
        - { name: session_id, in: query, schema: { type: string, format: uuid } }
        - { name: top_k, in: query, schema: { type: integer, default: 5, minimum: 1, maximum: 20 } }
      responses:
        "200":
          description: |
            SSE 流。每个事件格式：`data: {"delta": "...", "done": false}`
            最后一个事件：`data: {"done": true, "sources": [...], "session_id": "..."}`
          content:
            text/event-stream:
              schema: { type: string }
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }

  # ── 实例操作历史（Control Plane 操作追踪）──────────────────────────────────
  /instances/{instance_id}/operations:
    get:
      operationId: listInstanceOperations
      summary: 查询实例操作历史
      description: |
        返回指定实例的所有操作记录（创建、启动、停止、变配、删除等）。
        每条操作记录包含：操作类型、状态、触发用户、时间线步骤、失败原因和重试建议。
      tags: [Instances]
      x-ani-rbac-scope: "scope:instances:read"
      parameters:
        - { name: instance_id, in: path,  required: true, schema: { type: string } }
        - { name: limit,       in: query, schema: { type: integer, default: 20, minimum: 1, maximum: 100 } }
        - { name: cursor,      in: query, schema: { type: string } }
      responses:
        "200":
          description: 操作历史列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CursorPage'
                  - properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/InstanceOperation' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }

  /instance-operations/{operation_id}:
    get:
      operationId: getInstanceOperation
      summary: 查询单个操作详情
      description: 通过 operation_id 查询操作详情，包含完整时间线步骤。
      tags: [Instances]
      x-ani-rbac-scope: "scope:instances:read"
      parameters:
        - { name: operation_id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: 操作详情
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InstanceOperation' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }

  # ── 异步任务 ────────────────────────────────────────────────────────────────
  /tasks/{task_id}:
    get:
      summary: 查询异步任务状态
      tags: [Tasks]
      parameters:
        - { name: task_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AsyncTask' }
        "404":
          $ref: '#/components/responses/NotFound'

  # ── 计量 ────────────────────────────────────────────────────────────────────
  /metering/usage:
    get:
      summary: 查询租户用量统计
      tags: [Metering]
      parameters:
        - { name: start_time, in: query, required: true, schema: { type: string, format: date-time } }
        - { name: end_time,   in: query, required: true, schema: { type: string, format: date-time } }
        - { name: resource_type, in: query, schema: { type: string } }
        - { name: group_by, in: query, schema: { type: string, enum: [resource_type, az, day, hour] } }
      responses:
        "200":
          content:
            application/json:
              schema:
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        resource_type: { type: string }
                        total_quantity: { type: number }
                        unit:           { type: string }
                        period:         { type: string }

